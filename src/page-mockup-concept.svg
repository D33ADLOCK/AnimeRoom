<svg width="1440" height="920" viewBox="0 0 1440 920" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AnimeRoom editor page mockup">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1322"/>
      <stop offset="100%" stop-color="#0b0e16"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1440" height="920" fill="url(#bg)"/>

  <!-- Top bar -->
  <rect x="20" y="20" width="1400" height="70" rx="14" fill="#0b1020" stroke="#2c3554"/>
  <circle cx="60" cy="55" r="14" fill="#f97316"/>
  <text x="88" y="61" font-family="Arial, sans-serif" font-size="22" fill="#f3f4f6" font-weight="700">AnimeRoom Editor</text>
  <rect x="980" y="35" width="160" height="40" rx="10" fill="#312e81"/>
  <text x="1015" y="60" font-family="Arial, sans-serif" font-size="15" fill="#e0e7ff" font-weight="700">Regenerate</text>
  <rect x="1160" y="35" width="120" height="40" rx="10" fill="#065f46"/>
  <text x="1195" y="60" font-family="Arial, sans-serif" font-size="15" fill="#d1fae5" font-weight="700">Publish</text>
  <rect x="1295" y="35" width="105" height="40" rx="10" fill="#1f2937" stroke="#374151"/>
  <text x="1322" y="60" font-family="Arial, sans-serif" font-size="14" fill="#d1d5db" font-weight="700">Profile</text>

  <!-- Layout columns -->
  <rect x="20" y="105" width="260" height="795" rx="14" fill="url(#panel)" stroke="#2d3748" filter="url(#shadow)"/>
  <rect x="295" y="105" width="760" height="795" rx="14" fill="url(#panel)" stroke="#2d3748" filter="url(#shadow)"/>
  <rect x="1070" y="105" width="350" height="795" rx="14" fill="url(#panel)" stroke="#2d3748" filter="url(#shadow)"/>

  <!-- Left nav -->
  <text x="42" y="145" font-family="Arial, sans-serif" font-size="16" fill="#93c5fd" font-weight="700">Job Navigator</text>
  <rect x="38" y="165" width="222" height="52" rx="10" fill="#1f2937" stroke="#334155"/>
  <text x="52" y="197" font-family="Arial, sans-serif" font-size="14" fill="#e5e7eb">Sukuna vs Sakura</text>

  <text x="42" y="248" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" font-weight="700">ROUNDS</text>
  <rect x="38" y="260" width="222" height="44" rx="8" fill="#1d4ed8"/>
  <text x="52" y="287" font-family="Arial, sans-serif" font-size="13" fill="#eff6ff" font-weight="700">Round 1 · selected</text>
  <rect x="38" y="312" width="222" height="44" rx="8" fill="#111827" stroke="#374151"/>
  <text x="52" y="339" font-family="Arial, sans-serif" font-size="13" fill="#d1d5db">Round 2</text>
  <rect x="38" y="364" width="222" height="44" rx="8" fill="#111827" stroke="#374151"/>
  <text x="52" y="391" font-family="Arial, sans-serif" font-size="13" fill="#d1d5db">Round 3</text>
  <rect x="38" y="416" width="222" height="44" rx="8" fill="#111827" stroke="#374151"/>
  <text x="52" y="443" font-family="Arial, sans-serif" font-size="13" fill="#d1d5db">Round 4</text>

  <text x="42" y="495" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" font-weight="700">ASSET STATE</text>
  <rect x="38" y="507" width="222" height="90" rx="10" fill="#0b1222" stroke="#2a3756"/>
  <text x="52" y="532" font-family="Arial, sans-serif" font-size="12" fill="#86efac">● ready: 7</text>
  <text x="52" y="554" font-family="Arial, sans-serif" font-size="12" fill="#fbbf24">● edited: 2</text>
  <text x="52" y="576" font-family="Arial, sans-serif" font-size="12" fill="#60a5fa">● regenerating: 1</text>

  <!-- Center editor -->
  <text x="320" y="145" font-family="Arial, sans-serif" font-size="16" fill="#f3f4f6" font-weight="700">Round 1 Editor</text>

  <rect x="320" y="165" width="710" height="130" rx="12" fill="#0b1222" stroke="#2a3756"/>
  <text x="340" y="195" font-family="Arial, sans-serif" font-size="13" fill="#93c5fd" font-weight="700">Dialogue</text>
  <rect x="340" y="208" width="670" height="72" rx="8" fill="#111827" stroke="#374151"/>
  <text x="352" y="247" font-family="Arial, sans-serif" font-size="14" fill="#d1d5db">\"Sakura, your punches hit like wet noodles...\"</text>

  <rect x="320" y="312" width="710" height="238" rx="12" fill="#0b1222" stroke="#2a3756"/>
  <text x="340" y="342" font-family="Arial, sans-serif" font-size="13" fill="#93c5fd" font-weight="700">Image Selector</text>

  <!-- Image cards -->
  <rect x="340" y="358" width="150" height="170" rx="10" fill="#1f2937" stroke="#3b82f6"/>
  <rect x="350" y="370" width="130" height="104" rx="8" fill="#0f172a" stroke="#334155"/>
  <text x="382" y="495" font-family="Arial, sans-serif" font-size="12" fill="#bfdbfe">Front</text>
  <text x="368" y="514" font-family="Arial, sans-serif" font-size="11" fill="#86efac">Selected</text>

  <rect x="500" y="358" width="150" height="170" rx="10" fill="#1f2937" stroke="#374151"/>
  <rect x="510" y="370" width="130" height="104" rx="8" fill="#0f172a" stroke="#334155"/>
  <text x="546" y="495" font-family="Arial, sans-serif" font-size="12" fill="#cbd5e1">Side</text>

  <rect x="660" y="358" width="150" height="170" rx="10" fill="#1f2937" stroke="#374151"/>
  <rect x="670" y="370" width="130" height="104" rx="8" fill="#0f172a" stroke="#334155"/>
  <text x="697" y="495" font-family="Arial, sans-serif" font-size="12" fill="#cbd5e1">Profile</text>

  <rect x="830" y="358" width="180" height="170" rx="10" fill="#111827" stroke="#374151"/>
  <text x="848" y="385" font-family="Arial, sans-serif" font-size="12" fill="#e5e7eb" font-weight="700">Prompt</text>
  <text x="848" y="407" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Chibi Sukuna, front-facing,</text>
  <text x="848" y="423" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">adorable fierce expression...</text>
  <rect x="848" y="450" width="144" height="30" rx="8" fill="#1d4ed8"/>
  <text x="878" y="469" font-family="Arial, sans-serif" font-size="11" fill="#eff6ff">Edit Prompt</text>
  <rect x="848" y="487" width="144" height="30" rx="8" fill="#0f766e"/>
  <text x="871" y="506" font-family="Arial, sans-serif" font-size="11" fill="#ccfbf1">Regenerate</text>

  <rect x="320" y="567" width="710" height="150" rx="12" fill="#0b1222" stroke="#2a3756"/>
  <text x="340" y="597" font-family="Arial, sans-serif" font-size="13" fill="#93c5fd" font-weight="700">Dependencies</text>
  <text x="340" y="622" font-family="Arial, sans-serif" font-size="12" fill="#d1d5db">• Dialogue changed → regenerate round audio only</text>
  <text x="340" y="644" font-family="Arial, sans-serif" font-size="12" fill="#d1d5db">• Angle changed → no generation, just remap shot</text>
  <text x="340" y="666" font-family="Arial, sans-serif" font-size="12" fill="#d1d5db">• Prompt changed → regenerate selected image variant only</text>
  <rect x="840" y="682" width="170" height="30" rx="8" fill="#7c3aed"/>
  <text x="868" y="701" font-family="Arial, sans-serif" font-size="11" fill="#ede9fe">Apply Changes</text>

  <!-- Right sticky preview -->
  <text x="1090" y="145" font-family="Arial, sans-serif" font-size="16" fill="#f3f4f6" font-weight="700">Sticky Preview</text>
  <rect x="1090" y="165" width="310" height="550" rx="12" fill="#0b1222" stroke="#2a3756"/>
  <rect x="1120" y="210" width="250" height="445" rx="10" fill="#111827" stroke="#3f3f46"/>
  <polygon points="1235,415 1235,455 1270,435" fill="#22c55e"/>
  <text x="1140" y="685" font-family="Arial, sans-serif" font-size="12" fill="#a7f3d0">Preview updates after each applied change</text>

  <rect x="1090" y="732" width="310" height="58" rx="10" fill="#111827" stroke="#374151"/>
  <text x="1110" y="756" font-family="Arial, sans-serif" font-size="12" fill="#93c5fd" font-weight="700">Status: transforming_props</text>
  <text x="1110" y="775" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">Job: 62% complete</text>

  <rect x="1090" y="803" width="148" height="46" rx="10" fill="#065f46"/>
  <text x="1126" y="830" font-family="Arial, sans-serif" font-size="13" fill="#d1fae5" font-weight="700">Save Draft</text>
  <rect x="1252" y="803" width="148" height="46" rx="10" fill="#1d4ed8"/>
  <text x="1295" y="830" font-family="Arial, sans-serif" font-size="13" fill="#dbeafe" font-weight="700">Export</text>
</svg>
